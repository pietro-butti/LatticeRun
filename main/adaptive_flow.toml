# ──────────────────────────────────────────────────────────────────────────────
# [run]  — required
# ──────────────────────────────────────────────────────────────────────────────
[run]
device   = 0           # CUDA device index (0-based)
ens_name = "SuperCoarse"  # ensemble label; used in all output filenames


# ──────────────────────────────────────────────────────────────────────────────
# [geometry]  — required
# ──────────────────────────────────────────────────────────────────────────────
[geometry]
L  = [12, 12, 12, 12]  # full lattice extents; a scalar broadcasts (e.g. L = 16)
Lx = [4,  4,  4,  4]   # sub-lattice extents for domain decomposition; must divide L


# ──────────────────────────────────────────────────────────────────────────────
# [action]  — required
# ──────────────────────────────────────────────────────────────────────────────
[action]
beta = 4.2663    # inverse coupling β
c0   = 1.66666   # Symanzik coefficient (1.0 = Wilson plaquette action)


# ──────────────────────────────────────────────────────────────────────────────
# [hmc]  — optional; all four fields (ntherm/ntraj/delta/nleaps) must be
#          present together or all absent
# ──────────────────────────────────────────────────────────────────────────────
[hmc]
ntherm     = 1000   # thermalization trajectories (no measurements performed)
ntraj      = 5000  # production trajectories
delta      = 0.1   # leapfrog step size δ
nleaps     = 10    # number of leapfrog steps per trajectory


# ──────────────────────────────────────────────────────────────────────────────
# [io]  — optional
# ──────────────────────────────────────────────────────────────────────────────
[io]
# Where to start:
#   leave empty or "cold" → cold start (unit matrices)
#   "hot"                 → random start
#   "/path/to/file"       → load configuration from file
start_from = "hot"
save_to    = "./"   # directory for saved configurations; required if save_each
                    # or save_final is set
save_final = true   # always save the last configuration
# save_each = 10    # also save every N trajectories (comment out to disable)
logfile    = ""     # path to log file; leave empty for stdout only


# ──────────────────────────────────────────────────────────────────────────────
# [flow]  — optional; flow_each/flow_type/epsilon/nflow must all be set together
# ──────────────────────────────────────────────────────────────────────────────
[flow]
flow_each = 50                  # measure every N production trajectories

# Kernels to apply: "wilson", "zeuthen", or both.
# Both kernels are run independently on the same unflowed configuration.
flow_type = ["wilson"]

# Adaptive mode: step between consecutive flow_times using flw_adapt when the
# interval does not match epsilon exactly, or a single fixed step otherwise.
# flow_times defines the explicit measurement schedule — a non-uniform grid
# (denser at small t, coarser at large t) is typical for scale-setting studies.
adaptive   = false
epsilon    = 0.01   # base step size ε (used for fixed steps and as the
                    # integrator tolerance seed in flw_adapt)
nflow      = 100    # only used in fixed-step mode (adaptive = false);
                    # kept here because all flow fields must be set together
flow_times = [
    0.0,
    0.05, 0.1, 0.15, 0.2, 0.25, 0.3, 0.35, 0.4, 0.45, 0.5,
    0.6,  0.7, 0.8,  0.9, 1.0,
    1.25, 1.5, 1.75, 2.0,
    2.5,  3.0, 3.5,  4.0, 5.0,
]

# Optional CSV output. When set, each configuration's rows are appended to
# this file in a single write. When absent, flow data goes through the logger
# (main log or a redirect file set via SimLogger redirects).
flow_file = "SuperCoarse.csv"